[reticulum]
  share_instance = True
  default_algorithm = curve25519
  tcp_port = 4321

[interfaces]
  [[TCP Server Interface]]
    type = TCPServerInterface
    enabled = yes
    listen_ip = 0.0.0.0
    listen_port = 37428

  # Optional: connect to an existing Reticulum mesh peer (e.g. another node or hub).
  # Replace placeholders with your peer's public IP/hostname and port.
  [[TCP Client]]
    type = TCPClientInterface
    enabled = yes
    target_host = YOUR_MESH_PEER_HOST
    target_port = YOUR_MESH_PEER_PORT
