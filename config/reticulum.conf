# ═══════════════════════════════════════════════════════════════
# Reticulum Configuration for Hermes for Reticulum
# ═══════════════════════════════════════════════════════════════
#
# Copy this file to ~/.reticulum/config or set RETICULUM_CONFIG
# to point to the directory containing it.
#
# Full reference: https://reticulum.network/manual/config.html
# ═══════════════════════════════════════════════════════════════

[reticulum]

  # Allow shared instance — multiple programs can share this RNS instance
  share_instance = True

  # Default identity algorithm
  default_algorithm = curve25519

  # TCP port for shared instance IPC
  tcp_port = 37428

  # Enable packet filtering (recommended for public-facing nodes)
  # packet_filter = True

  # ─── Transport Timeout ───
  # How long to wait for path discovery (seconds)
  # path_request_timeout = 15

  # ─── Identity Storage ───
  # Default: ~/.reticulum/storage/identities
  # identity_storage_path =


# ═══════════════════════════════════════════════════════════════
# Interfaces
# ═══════════════════════════════════════════════════════════════
#
# At least one interface is required. Choose based on your setup:

[interfaces]

  # ─── TCP Server (Recommended for VPS) ───
  # The VPS listens for incoming TCP connections from other Reticulum nodes.
  # Sideband on Android can connect over the Internet or via a local LoRa bridge.
  [[TCP Server]]
    type = TCPServerInterface
    listen_ip = 0.0.0.0
    listen_port = 37428

  # ─── TCP Client (Connect to another node) ───
  # Uncomment to connect as a client to an existing Reticulum node.
  # [[TCP Client]]
  #   type = TCPClientInterface
  #   target_host = 192.168.1.100
  #   target_port = 37428

  # ─── LoRa Interface (Requires hardware) ───
  # Uncomment and configure when LoRa hardware is connected.
  # [[LoRa Interface]]
  #   type = LoRaInterface
  #   port = /dev/ttyUSB0
  #   speed = 115200
  #   spreading_factor = 10
  #   bandwidth = 125000
  #   coding_rate = 5
  #   tx_power = 20
  #   preamble_length = 8
  #   sync_word = 0x12

  # ─── I2P Interface (Anonymous routing) ───
  # Requires I2P router running locally.
  # [[I2P Interface]]
  #   type = I2PInterface
  #   i2p_endpoint = 127.0.0.1:7656
